mode: megadepth_raw

data_root: /content/MegaDepth
train_scenes: ["0001", "0002"]
val_scenes: ["0003"]

depth_h5_key: depth
image_height: 480
image_width: 640

batch_size: 4
num_workers: 0
max_epochs: 40
lr: 1.0e-4
weight_decay: 1.0e-4
mixed_precision: true
grad_clip_norm: 10.0

num_keypoints: 1024
nms_radius: 4
min_keypoint_score: 0.01
descriptor_dim: 256

# positive_margin: lowered from 1.0 → 0.5.
#
# With frozen SuperPoint, pos_sim is bounded by what SP produces for
# corresponding patches — typically 0.35–0.65 for genuinely matching
# keypoints.  With mp=1.0 the positive hinge is:
#   lambda_d * relu(1.0 - 0.19) = 25 * 0.81 = 20.25 per pair
# This floor is IRREDUCIBLE because the optimiser cannot increase pos_sim
# (descriptors are frozen).  The loss plateau at ~9.5 is the direct
# consequence — the hinge can never decrease no matter what the detector
# learns.
#
# With mp=0.5 the hinge becomes:
#   25 * relu(0.5 - pos_sim).  When pos_sim reaches 0.5, hinge → 0.
# SuperPoint can achieve pos_sim ≥ 0.5 for genuinely corresponding patches,
# so this target is reachable and the loss will actually decrease as the
# detector learns to find better keypoints.
positive_margin: 0.5

negative_margin: 0.2
# lambda_d stays at 25 — the descriptor signal is still useful.
lambda_d: 25.0
# lambda_rep: raised from 0.5 → 2.0.
#
# The rep_loss is the ONLY directly actionable signal for the XFeat kp head
# (it drives scores up at positions that have correspondences).  At 0.5 it
# contributed 0.5 * (-0.88) = -0.44 vs hinge of 10.1 — a 4% share of the
# gradient.  At 2.0 it contributes 2.0 * (-0.88) = -1.76 vs new hinge of
# ~3.9 — a 45% share.  This gives the detector the gradient weight it
# needs to learn to predict repeatable keypoints.
lambda_rep: 2.0
correspondence_threshold: 6.0
safe_radius: 8.0
balance_pos_neg: true

augment_photometric: true
augment_geometric: true

unfreeze_at_epoch: null
unfreeze_keywords: []

# FIX-2: model_selection_metric changed from sim_gap → val_loss.
model_selection_metric: val_loss   # sim_gap | repeatability_mean | val_loss

# FIX-3: early_stop_patience reduced from 12 → 5.
early_stop_patience: 5
lr_patience: 3
lr_factor: 0.5
min_lr: 1.0e-6
val_max_batches: 20

superpoint_weights_path: weights/superpoint_v1.pth
superpoint_weights_url: https://github.com/cvg/LightGlue/releases/download/v0.1_arxiv/superpoint_v1.pth
xfeat_weights_path: weights/xfeat.pt

checkpoint_dir: hybrid_model_v2/checkpoints
log_dir: hybrid_model_v2/runs
logging_backend: tensorboard  # tensorboard | wandb
wandb_project: xfeat-superpoint-hybrid-v2

# FIX-4: Disable the legacy plateau milestone check.
# The thresholds [0.45, 0.55] were tuned for a different loss scale.
# Setting min > max (or both outside [0, 2]) causes the condition
# `0.0 <= lo <= hi <= 2.0` to be False, so the check is skipped entirely
# and the spurious "milestone not met" warning disappears.
preflight_plateau_threshold_min: 999.0
preflight_plateau_threshold_max: 1000.0