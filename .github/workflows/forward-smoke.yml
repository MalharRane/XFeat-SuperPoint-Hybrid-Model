name: forward-smoke

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-colab.txt
      - name: Run forward compatibility smoke tests
        run: |
          python -m unittest tests/test_forward_compat.py -v
