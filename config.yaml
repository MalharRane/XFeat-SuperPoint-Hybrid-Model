# config.yaml
# ============================================================================
# XFeat-SuperPoint Hybrid Model — Training Configuration
# ============================================================================
#
# Usage:
#   python train.py --config config.yaml
#
# All values here are defaults. Override any via CLI arguments:
#   python train.py --config config.yaml --lr 1e-4 --batch_size 8
# ============================================================================


# ---------------------------------------------------------------------------
# Training mode
# ---------------------------------------------------------------------------
mode: synthetic          # 'synthetic' | 'megadepth'
                         # synthetic  → random homographic warps (pre-training)
                         # megadepth  → real scene pairs (fine-tuning)

# ---------------------------------------------------------------------------
# Data paths
# ---------------------------------------------------------------------------
data_root: ./data/images  # synthetic: directory of raw images
                           # megadepth: path to MegaDepth root directory

scene_info_dir: null       # megadepth only: path to scene_info/ .npz files
                           # null → data_root/scene_info (default)

# ---------------------------------------------------------------------------
# Image configuration
# ---------------------------------------------------------------------------
image_height: 480          # H — must be divisible by 8
image_width:  640          # W — must be divisible by 8

# ---------------------------------------------------------------------------
# Model hyperparameters
# ---------------------------------------------------------------------------
num_keypoints:  1024       # Maximum keypoints extracted per image
nms_radius:     4          # NMS window half-radius (pixels)
min_keypoint_score: 0.01   # Drop low-confidence detections (helps suppress sky noise)
descriptor_dim: 256        # SuperPoint descriptor dimensionality (fixed)

# ---------------------------------------------------------------------------
# Loss function
# ---------------------------------------------------------------------------
positive_margin:          1.0    # mp: target cosine-sim for matching pairs
negative_margin:          0.2    # mn: max allowed cosine-sim for non-matches
lambda_d:                 250.0  # λd: weighting for positive pairs
lambda_rep:               0.5    # λrep: repeatability reward weight
                                  #   > 0 rewards high scores at geometrically
                                  #   matched positions, providing the positive
                                  #   gradient component to the kp_head.
                                  #   0.0 to disable (use only score-down pressure).
correspondence_threshold: 6.0    # τ: tighter pixel distance threshold for pos labels
safe_radius:              8.0    # exclude warped points too close to image border
balance_pos_neg:          true   # normalise positive/negative hinge terms separately

# ---------------------------------------------------------------------------
# Optimisation
# ---------------------------------------------------------------------------
batch_size:       4          # Pairs per batch (reduce if OOM)
num_workers:      4          # DataLoader workers (set 0 for debug)
max_epochs:       80         # Longer schedule helps after late-stage LR drops on small MegaDepth splits
lr:               1.0e-4     # Initial Adam learning rate
weight_decay:     1.0e-4     # L2 regularisation
lr_patience:      2          # ReduceLROnPlateau patience (epochs without improvement)
lr_factor:        0.5        # Multiply LR by this when plateau detected
min_lr:           1.0e-6     # Minimum learning rate floor
lr_threshold:     1.0e-4     # Min relative improvement to avoid LR decay
lr_cooldown:      0          # Cooldown epochs after LR reduction
grad_clip_norm:   10.0       # Max gradient norm (important with large λd)
mixed_precision:  true       # AMP (disable on CPU or old CUDA)
early_stop_patience: 20      # Stop after N epochs without val improvement
model_selection_metric: loss # 'loss' | 'sim_gap' | 'repeatability'
val_max_batches: 50          # Validation batches per epoch (increase for stability)

# Optional staged capacity expansion
unfreeze_at_epoch: null      # e.g. 10 to unfreeze extra XFeat modules after warmup
unfreeze_keywords: []        # e.g. ['block3', 'block4']

# ---------------------------------------------------------------------------
# Data filters (megadepth mode only)
# ---------------------------------------------------------------------------
min_overlap: 0.15            # Min covisibility score for a valid pair
max_overlap: 0.70            # Max covisibility (trivial pairs excluded)
max_pairs_per_scene: 1000    # 1000 pairs/scene (up from previous 200) for denser supervision
augment:     true            # Photometric augmentation on image2

# ---------------------------------------------------------------------------
# Optional 2-stage schedule (recommended): synthetic -> megadepth
# ---------------------------------------------------------------------------
two_stage: false
synthetic_data_root: null    # Required when two_stage=true and synthetic data differs
megadepth_data_root: null    # Required when two_stage=true and MegaDepth root differs
stage1_epochs: 30
stage2_epochs: 50
stage1_checkpoint_subdir: stage1_synthetic
stage2_checkpoint_subdir: stage2_megadepth
stage1_log_subdir: stage1_synthetic
stage2_log_subdir: stage2_megadepth

# ---------------------------------------------------------------------------
# Checkpointing & logging
# ---------------------------------------------------------------------------
checkpoint_dir: checkpoints  # Where to save .pth files
log_dir:        runs         # TensorBoard log directory
save_every:     5            # Save checkpoint every N epochs
val_every:      1            # Run validation every N epochs
